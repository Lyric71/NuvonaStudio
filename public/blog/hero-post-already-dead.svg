<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <filter id="ds1" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="ds2" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#001840"/>
  <radialGradient id="bg1" cx="55%" cy="50%"><stop offset="0%" stop-color="#002860" stop-opacity="0.35"/><stop offset="100%" stop-color="transparent"/></radialGradient>
  <rect width="1200" height="630" fill="url(#bg1)"/>

  <!-- Timeline arrow -->
  <line x1="100" y1="315" x2="1100" y2="315" stroke="rgba(255,255,255,0.06)" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="130" y="345" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.25)" letter-spacing="0.08em">0 MIN</text>
  <text x="380" y="345" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.25)" letter-spacing="0.08em">60 MIN</text>
  <text x="620" y="345" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.25)" letter-spacing="0.08em">2 HOURS</text>
  <text x="880" y="345" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.15)" letter-spacing="0.08em">24 HOURS</text>
  <text x="1030" y="345" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.08)" letter-spacing="0.08em">48 HOURS</text>

  <!-- Post at 0 min (alive, prominent) -->
  <g filter="url(#ds1)" transform="translate(60, 60) rotate(-1)">
    <rect width="320" height="240" rx="10" fill="#fff"/>
    <rect width="320" height="3" rx="1.5" fill="#0A66C2" y="0"/>
    <!-- Profile -->
    <circle cx="32" cy="34" r="18" fill="#1A3A5C"/>
    <text x="32" y="39" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">CD</text>
    <text x="58" y="30" font-family="system-ui,sans-serif" font-size="11.5" font-weight="700" fill="#191919">Cyril Drouin</text>
    <text x="58" y="44" font-family="system-ui,sans-serif" font-size="9.5" fill="#666">Founder at Nuvora Studio</text>
    <text x="58" y="56" font-family="system-ui,sans-serif" font-size="9" fill="#999">Just now · 🌐</text>
    <!-- Content -->
    <text x="18" y="82" font-family="system-ui,sans-serif" font-size="11.5" fill="#191919" font-weight="600">We analyzed 200 B2B company pages.</text>
    <text x="18" y="98" font-family="system-ui,sans-serif" font-size="11.5" fill="#191919" font-weight="600">Here's what separates the top 5%.</text>
    <text x="18" y="118" font-family="system-ui,sans-serif" font-size="11" fill="#333">The ones winning on LinkedIn share</text>
    <text x="18" y="133" font-family="system-ui,sans-serif" font-size="11" fill="#333">3 traits that most brands ignore...</text>
    <text x="18" y="152" font-family="system-ui,sans-serif" font-size="11" fill="#0A66C2">...see more</text>
    <!-- Notification pulse -->
    <rect x="18" y="168" width="284" height="32" rx="6" fill="#EEF5FF"/>
    <text x="30" y="189" font-family="system-ui,sans-serif" font-size="10" fill="#0A66C2" font-weight="600">🔔 Your post is being distributed to your network</text>
    <!-- Engagement -->
    <line x1="18" y1="210" x2="302" y2="210" stroke="#E8E8E8" stroke-width="1"/>
    <text x="18" y="228" font-family="system-ui,sans-serif" font-size="10" fill="#666">👍 💡  12 · 💬 3 comments</text>
  </g>

  <!-- Alive badge -->
  <g transform="translate(220, 55)">
    <rect x="-28" y="-10" width="56" height="20" rx="10" fill="#1A8A5A"/>
    <text x="0" y="4" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">ALIVE</text>
  </g>

  <!-- Post at 60 min (critical moment) -->
  <g filter="url(#ds2)" transform="translate(330, 80)">
    <rect width="280" height="200" rx="10" fill="#fff"/>
    <rect width="280" height="3" rx="1.5" fill="#E8A000" y="0"/>
    <circle cx="30" cy="32" r="16" fill="#1A3A5C"/>
    <text x="30" y="37" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">CD</text>
    <text x="52" y="28" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#191919">Cyril Drouin</text>
    <text x="52" y="42" font-family="system-ui,sans-serif" font-size="9" fill="#999">1h · 🌐</text>
    <text x="16" y="68" font-family="system-ui,sans-serif" font-size="11" fill="#191919" font-weight="600">We analyzed 200 B2B company...</text>
    <text x="16" y="84" font-family="system-ui,sans-serif" font-size="10.5" fill="#333">The ones winning on LinkedIn...</text>
    <!-- Critical window alert -->
    <rect x="16" y="100" width="248" height="44" rx="6" fill="#FFF8E8" stroke="#F0D888" stroke-width="1"/>
    <text x="28" y="118" font-family="system-ui,sans-serif" font-size="9.5" fill="#996600" font-weight="600">⏱ CRITICAL WINDOW</text>
    <text x="28" y="134" font-family="system-ui,sans-serif" font-size="9" fill="#996600">360Brew is evaluating your early signals...</text>
    <line x1="16" y1="155" x2="264" y2="155" stroke="#E8E8E8" stroke-width="1"/>
    <text x="16" y="173" font-family="system-ui,sans-serif" font-size="10" fill="#666">👍 💡  48 · 💬 8 comments</text>
    <text x="248" y="173" font-family="system-ui,sans-serif" font-size="9" fill="#E8A000" text-anchor="end" font-weight="600">DECIDING...</text>
  </g>

  <!-- Post at 2 hours (dead) -->
  <g filter="url(#ds2)" transform="translate(560, 100) rotate(0.5)" opacity="0.7">
    <rect width="260" height="180" rx="10" fill="#fff"/>
    <rect width="260" height="3" rx="1.5" fill="#E0E0E0" y="0"/>
    <circle cx="28" cy="30" r="15" fill="#ddd"/>
    <text x="28" y="35" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#bbb" text-anchor="middle">CD</text>
    <text x="50" y="26" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#999">Cyril Drouin</text>
    <text x="50" y="39" font-family="system-ui,sans-serif" font-size="8.5" fill="#bbb">2h · 🌐</text>
    <text x="16" y="62" font-family="system-ui,sans-serif" font-size="10.5" fill="#999">We analyzed 200 B2B company...</text>
    <text x="16" y="78" font-family="system-ui,sans-serif" font-size="10" fill="#bbb">The ones winning on LinkedIn...</text>
    <!-- Dead alert -->
    <rect x="16" y="92" width="228" height="38" rx="6" fill="#FEF0F0" stroke="#F0D0D0" stroke-width="1"/>
    <text x="28" y="108" font-family="system-ui,sans-serif" font-size="9" fill="#CC3333" font-weight="600">⛔ Distribution stopped</text>
    <text x="28" y="122" font-family="system-ui,sans-serif" font-size="8.5" fill="#CC3333">Only 5% of posts recover after this point</text>
    <line x1="16" y1="140" x2="244" y2="140" stroke="#E8E8E8" stroke-width="1"/>
    <text x="16" y="158" font-family="system-ui,sans-serif" font-size="10" fill="#bbb">👍 52 · 💬 8 comments</text>
    <text x="228" y="158" font-family="system-ui,sans-serif" font-size="9" fill="#CC3333" text-anchor="end" font-weight="600">DEAD</text>
  </g>

  <!-- Post at 24h (ghost, very faded) -->
  <g filter="url(#ds2)" transform="translate(790, 120) rotate(1)" opacity="0.35">
    <rect width="240" height="160" rx="10" fill="#fff"/>
    <rect width="240" height="3" rx="1.5" fill="#E0E0E0" y="0"/>
    <circle cx="26" cy="28" r="14" fill="#E8E8E8"/>
    <text x="48" y="24" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#bbb">Cyril Drouin</text>
    <text x="48" y="37" font-family="system-ui,sans-serif" font-size="8" fill="#ccc">1d · 🌐</text>
    <text x="14" y="58" font-family="system-ui,sans-serif" font-size="10" fill="#ccc">We analyzed 200 B2B...</text>
    <line x1="14" y1="120" x2="226" y2="120" stroke="#E8E8E8" stroke-width="1"/>
    <text x="14" y="140" font-family="system-ui,sans-serif" font-size="10" fill="#ddd">👍 53 · 💬 8 comments</text>
  </g>

  <!-- Post at 48h (barely visible) -->
  <g transform="translate(1000, 140) rotate(1.5)" opacity="0.15">
    <rect width="200" height="140" rx="10" fill="#fff"/>
    <circle cx="24" cy="26" r="12" fill="#E8E8E8"/>
    <text x="44" y="22" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#ccc">Cyril Drouin</text>
    <text x="14" y="50" font-family="system-ui,sans-serif" font-size="9" fill="#ddd">We analyzed 200...</text>
    <text x="14" y="110" font-family="system-ui,sans-serif" font-size="9" fill="#ddd">👍 53</text>
  </g>

  <!-- Bottom label -->
  <text x="600" y="420" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="0.06em">YOUR POST HAS A 2-HOUR WINDOW. AFTER THAT, IT'S GONE.</text>

  <!-- Stats row at bottom -->
  <g transform="translate(0, 450)">
    <rect x="120" y="0" width="260" height="80" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="250" y="28" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="0.06em">AI-GENERATED POSTS</text>
    <text x="250" y="56" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="rgba(255,255,255,0.5)" text-anchor="middle">50%+</text>
    <text x="250" y="72" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" text-anchor="middle">of long-form LinkedIn content</text>

    <rect x="420" y="0" width="260" height="80" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="550" y="28" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="0.06em">POSTS THAT RECOVER</text>
    <text x="550" y="56" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="rgba(255,255,255,0.5)" text-anchor="middle">~5%</text>
    <text x="550" y="72" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" text-anchor="middle">after flopping in the first hour</text>

    <rect x="720" y="0" width="260" height="80" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="850" y="28" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="0.06em">AVG. POST LIFESPAN</text>
    <text x="850" y="56" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="rgba(255,255,255,0.5)" text-anchor="middle">2–48h</text>
    <text x="850" y="72" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" text-anchor="middle">depending on early engagement</text>
  </g>

  <!-- Top label -->
  <rect x="410" y="22" width="380" height="28" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="600" y="41" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="0.1em">THE LIFECYCLE OF A LINKEDIN POST IN 2026</text>
</svg>