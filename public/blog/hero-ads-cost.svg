<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <filter id="sh1" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="sh2" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#001840"/>
  <radialGradient id="bg2" cx="70%" cy="40%"><stop offset="0%" stop-color="#003080" stop-opacity="0.25"/><stop offset="100%" stop-color="transparent"/></radialGradient>
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Title area -->
  <text x="600" y="52" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="0.12em">COST PER CLICK BY PLATFORM</text>

  <!-- LinkedIn Card (left, prominent) -->
  <g filter="url(#sh1)" transform="translate(60, 80)">
    <rect width="340" height="480" rx="12" fill="#fff"/>
    <!-- LinkedIn header -->
    <rect width="340" height="56" rx="12" fill="#0A66C2"/>
    <rect y="44" width="340" height="12" fill="#0A66C2"/>
    <text x="170" y="36" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">LinkedIn Ads</text>
    <!-- CPC -->
    <text x="170" y="108" font-family="system-ui,sans-serif" font-size="48" font-weight="800" fill="#191919" text-anchor="middle">$5–$12</text>
    <text x="170" y="130" font-family="system-ui,sans-serif" font-size="13" fill="#666" text-anchor="middle">avg. cost per click</text>
    <line x1="40" y1="148" x2="300" y2="148" stroke="#E8E8E8" stroke-width="1"/>
    <!-- Stats -->
    <text x="40" y="180" font-family="system-ui,sans-serif" font-size="12" fill="#666">Conversion rate</text>
    <text x="300" y="180" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#0A66C2" text-anchor="end">6.1%</text>
    <text x="40" y="210" font-family="system-ui,sans-serif" font-size="12" fill="#666">Avg. CPL</text>
    <text x="300" y="210" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#191919" text-anchor="end">$130–$200</text>
    <text x="40" y="240" font-family="system-ui,sans-serif" font-size="12" fill="#666">ROAS (B2B)</text>
    <text x="300" y="240" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#0A66C2" text-anchor="end">4.1–8.3x</text>
    <text x="40" y="270" font-family="system-ui,sans-serif" font-size="12" fill="#666">Lead quality</text>
    <text x="300" y="270" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#0A66C2" text-anchor="end">Verified title + co.</text>
    <line x1="40" y1="290" x2="300" y2="290" stroke="#E8E8E8" stroke-width="1"/>
    <!-- Targeting detail -->
    <text x="40" y="318" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#666" letter-spacing="0.05em">TARGETING PRECISION</text>
    <text x="40" y="342" font-family="system-ui,sans-serif" font-size="12" fill="#333">✓ Job title</text>
    <text x="40" y="362" font-family="system-ui,sans-serif" font-size="12" fill="#333">✓ Company name</text>
    <text x="40" y="382" font-family="system-ui,sans-serif" font-size="12" fill="#333">✓ Seniority level</text>
    <text x="40" y="402" font-family="system-ui,sans-serif" font-size="12" fill="#333">✓ Industry + company size</text>
    <text x="40" y="422" font-family="system-ui,sans-serif" font-size="12" fill="#333">✓ Self-reported data</text>
    <!-- Verdict -->
    <rect x="30" y="440" width="280" height="28" rx="14" fill="#0A66C2" opacity="0.08"/>
    <text x="170" y="459" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0A66C2" text-anchor="middle">Premium cost. Premium leads.</text>
  </g>

  <!-- Meta Card -->
  <g filter="url(#sh2)" transform="translate(450, 120)">
    <rect width="280" height="380" rx="12" fill="#fff"/>
    <rect width="280" height="48" rx="12" fill="#1877F2"/>
    <rect y="36" width="280" height="12" fill="#1877F2"/>
    <text x="140" y="32" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Meta Ads</text>
    <text x="140" y="92" font-family="system-ui,sans-serif" font-size="38" font-weight="800" fill="#191919" text-anchor="middle">$0.50–$2</text>
    <text x="140" y="112" font-family="system-ui,sans-serif" font-size="12" fill="#666" text-anchor="middle">avg. cost per click</text>
    <line x1="30" y1="128" x2="250" y2="128" stroke="#E8E8E8" stroke-width="1"/>
    <text x="30" y="155" font-family="system-ui,sans-serif" font-size="11.5" fill="#666">Conversion rate</text>
    <text x="250" y="155" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#666" text-anchor="end">~1.5%</text>
    <text x="30" y="180" font-family="system-ui,sans-serif" font-size="11.5" fill="#666">Avg. CPL</text>
    <text x="250" y="180" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#666" text-anchor="end">~$100</text>
    <text x="30" y="205" font-family="system-ui,sans-serif" font-size="11.5" fill="#666">Lead quality</text>
    <text x="250" y="205" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#CC6600" text-anchor="end">Unverified</text>
    <line x1="30" y1="222" x2="250" y2="222" stroke="#E8E8E8" stroke-width="1"/>
    <text x="30" y="248" font-family="system-ui,sans-serif" font-size="10.5" font-weight="600" fill="#666" letter-spacing="0.05em">TARGETING</text>
    <text x="30" y="270" font-family="system-ui,sans-serif" font-size="11.5" fill="#999">~ Interest-based guesses</text>
    <text x="30" y="290" font-family="system-ui,sans-serif" font-size="11.5" fill="#999">~ Lookalike audiences</text>
    <text x="30" y="310" font-family="system-ui,sans-serif" font-size="11.5" fill="#999">~ Behavioral inference</text>
    <rect x="30" y="335" width="220" height="28" rx="14" fill="#F5F5F5"/>
    <text x="140" y="354" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#999" text-anchor="middle">Cheap clicks. Unclear leads.</text>
  </g>

  <!-- Google Card -->
  <g filter="url(#sh2)" transform="translate(780, 120)">
    <rect width="280" height="380" rx="12" fill="#fff"/>
    <rect width="280" height="48" rx="12" fill="#4285F4"/>
    <rect y="36" width="280" height="12" fill="#4285F4"/>
    <text x="140" y="32" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Google Search Ads</text>
    <text x="140" y="92" font-family="system-ui,sans-serif" font-size="38" font-weight="800" fill="#191919" text-anchor="middle">$2.69</text>
    <text x="140" y="112" font-family="system-ui,sans-serif" font-size="12" fill="#666" text-anchor="middle">avg. cost per click</text>
    <line x1="30" y1="128" x2="250" y2="128" stroke="#E8E8E8" stroke-width="1"/>
    <text x="30" y="155" font-family="system-ui,sans-serif" font-size="11.5" fill="#666">Conversion rate</text>
    <text x="250" y="155" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#666" text-anchor="end">3.75%</text>
    <text x="30" y="180" font-family="system-ui,sans-serif" font-size="11.5" fill="#666">Avg. CPL</text>
    <text x="250" y="180" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#666" text-anchor="end">~$72</text>
    <text x="30" y="205" font-family="system-ui,sans-serif" font-size="11.5" fill="#666">Lead quality</text>
    <text x="250" y="205" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#CC6600" text-anchor="end">Intent-based</text>
    <line x1="30" y1="222" x2="250" y2="222" stroke="#E8E8E8" stroke-width="1"/>
    <text x="30" y="248" font-family="system-ui,sans-serif" font-size="10.5" font-weight="600" fill="#666" letter-spacing="0.05em">TARGETING</text>
    <text x="30" y="270" font-family="system-ui,sans-serif" font-size="11.5" fill="#999">~ Keyword-based</text>
    <text x="30" y="290" font-family="system-ui,sans-serif" font-size="11.5" fill="#999">~ No job title targeting</text>
    <text x="30" y="310" font-family="system-ui,sans-serif" font-size="11.5" fill="#999">~ No company filtering</text>
    <rect x="30" y="335" width="220" height="28" rx="14" fill="#F5F5F5"/>
    <text x="140" y="354" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#999" text-anchor="middle">Good intent. No B2B filter.</text>
  </g>

  <!-- Bottom caption -->
  <text x="600" y="598" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="0.06em">COST PER CLICK IS THE WRONG METRIC. COST PER QUALIFIED LEAD IS WHAT MATTERS.</text>
</svg>