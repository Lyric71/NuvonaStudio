    <text x="42" y="49" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">SL</text>
    <text x="74" y="38" font-family="system-ui,sans-serif" font-size="13.5" font-weight="700" fill="#191919">Sarah Laurent</text>
    <text x="74" y="54" font-family="system-ui,sans-serif" font-size="11" fill="#666">Supply Chain Consultant · 800 followers</text>
    <text x="74" y="68" font-family="system-ui,sans-serif" font-size="10.5" fill="#999">2d · 🌐</text>

    <!-- Post content -->
    <text x="24" y="102" font-family="system-ui,sans-serif" font-size="13" fill="#191919" font-weight="600">We just helped a manufacturing client cut</text>
    <text x="24" y="119" font-family="system-ui,sans-serif" font-size="13" fill="#191919" font-weight="600">their procurement cycle from 14 weeks to 6.</text>
    <text x="24" y="143" font-family="system-ui,sans-serif" font-size="12.5" fill="#333">Here's what nobody tells you about</text>
    <text x="24" y="160" font-family="system-ui,sans-serif" font-size="12.5" fill="#333">streamlining supply chain for mid-market</text>
    <text x="24" y="177" font-family="system-ui,sans-serif" font-size="12.5" fill="#333">manufacturers (50-200 employees):</text>
    <text x="24" y="201" font-family="system-ui,sans-serif" font-size="12.5" fill="#333">1. The bottleneck is never where you think</text>
    <text x="24" y="218" font-family="system-ui,sans-serif" font-size="12.5" fill="#333">2. Legacy ERP is usually the real problem</text>
    <text x="24" y="235" font-family="system-ui,sans-serif" font-size="12.5" fill="#333">3. Start with the vendor relationship, not</text>
    <text x="24" y="252" font-family="system-ui,sans-serif" font-size="12.5" fill="#333">    the software...</text>
    <text x="24" y="274" font-family="system-ui,sans-serif" font-size="12.5" fill="#0A66C2">...see more</text>

    <!-- Engagement metrics box -->
