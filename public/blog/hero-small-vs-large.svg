<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 500" fill="none">
  <rect width="1400" height="500" fill="#001840"/>
  <defs>
    <linearGradient id="g4" x1="0" y1="0" x2="1400" y2="500">
      <stop offset="0%" stop-color="#00A8DC" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#001840"/>
      <stop offset="100%" stop-color="#0A66C2" stop-opacity="0.08"/>
    </linearGradient>
    <radialGradient id="rg4a" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0A66C2" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="rg4b" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00A8DC" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1400" height="500" fill="url(#g4)"/>
  <!-- Large account circle (big but faded) -->
  <circle cx="900" cy="250" r="180" stroke="#0077B5" stroke-width="1" fill="url(#rg4a)" opacity="0.4"/>
  <circle cx="900" cy="250" r="120" stroke="#0077B5" stroke-width="0.5" fill="none" opacity="0.15"/>
  <circle cx="900" cy="250" r="60" stroke="#0077B5" stroke-width="0.5" fill="none" opacity="0.1"/>
  <!-- Small account circle (small but bright) -->
