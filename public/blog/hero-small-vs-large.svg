    <text x="40" y="320" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#CC3333" letter-spacing="0.05em">PERFORMANCE</text>
    <text x="40" y="345" font-family="system-ui,sans-serif" font-size="12" fill="#666">Impressions</text>
    <text x="370" y="345" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#191919" text-anchor="end">768</text>
    <text x="40" y="368" font-family="system-ui,sans-serif" font-size="12" fill="#666">Engagement rate</text>
    <rect x="260" y="355" width="50" height="20" rx="10" fill="#CC3333" opacity="0.1"/>
    <text x="285" y="370" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#CC3333" text-anchor="middle">0.6%</text>
    <text x="370" y="368" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#CC3333" text-anchor="end">▼ Bottom 20%</text>
    <text x="40" y="391" font-family="system-ui,sans-serif" font-size="12" fill="#666">Connection requests</text>
    <text x="370" y="391" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#CC3333" text-anchor="end">+0</text>

    <!-- Engagement bar -->
    <line x1="24" y1="425" x2="416" y2="425" stroke="#E8E8E8" stroke-width="1"/>
    <text x="24" y="445" font-family="system-ui,sans-serif" font-size="11" fill="#999">👍 5 · 💬 0 comments · ↗ 0 reposts</text>
    <line x1="24" y1="460" x2="416" y2="460" stroke="#E8E8E8" stroke-width="1"/>
    <text x="75" y="482" font-family="system-ui,sans-serif" font-size="12" fill="#666" text-anchor="middle">👍 Like</text>
    <text x="180" y="482" font-family="system-ui,sans-serif" font-size="12" fill="#666" text-anchor="middle">💬 Comment</text>
    <text x="295" y="482" font-family="system-ui,sans-serif" font-size="12" fill="#666" text-anchor="middle">↗ Repost</text>
    <text x="390" y="482" font-family="system-ui,sans-serif" font-size="12" fill="#666" text-anchor="middle">📤 Send</text>
