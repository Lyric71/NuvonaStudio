    <text x="24" y="119" font-family="system-ui,sans-serif" font-size="13" fill="#191919" font-weight="600">partnership with industry leaders! 🎉</text>
    <text x="24" y="143" font-family="system-ui,sans-serif" font-size="12.5" fill="#333">At GlobalTech Solutions, we believe in the</text>
    <text x="24" y="160" font-family="system-ui,sans-serif" font-size="12.5" fill="#333">power of innovation and collaboration. Our</text>
    <text x="24" y="177" font-family="system-ui,sans-serif" font-size="12.5" fill="#333">team is committed to delivering cutting-edge</text>
    <text x="24" y="194" font-family="system-ui,sans-serif" font-size="12.5" fill="#333">solutions that drive digital transformation</text>
    <text x="24" y="211" font-family="system-ui,sans-serif" font-size="12.5" fill="#333">across enterprises worldwide.</text>
    <text x="24" y="235" font-family="system-ui,sans-serif" font-size="12.5" fill="#333">Stay tuned for more updates! 🚀</text>
    <text x="24" y="259" font-family="system-ui,sans-serif" font-size="12.5" fill="#333">#Innovation #DigitalTransformation #IT</text>
    <text x="24" y="276" font-family="system-ui,sans-serif" font-size="12.5" fill="#333">#Leadership #Partnership #TechNews</text>

    <!-- Engagement metrics box -->
