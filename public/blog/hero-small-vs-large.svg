    <text x="40" y="320" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#1A8A5A" letter-spacing="0.05em">PERFORMANCE</text>
    <text x="40" y="345" font-family="system-ui,sans-serif" font-size="12" fill="#666">Impressions</text>
    <text x="370" y="345" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#191919" text-anchor="end">4,200</text>
