    <circle cx="420" cy="200" r="3"/><circle cx="480" cy="210" r="3"/><circle cx="440" cy="290" r="3"/><circle cx="470" cy="270" r="3"/>
    <circle cx="430" cy="240" r="3"/><circle cx="460" cy="260" r="3"/>
