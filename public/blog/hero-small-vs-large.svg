<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <filter id="ds1" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#001840"/>
  <radialGradient id="bg4" cx="40%" cy="50%"><stop offset="0%" stop-color="#002060" stop-opacity="0.35"/><stop offset="100%" stop-color="transparent"/></radialGradient>
  <rect width="1200" height="630" fill="url(#bg4)"/>

  <!-- Left label -->
  <rect x="115" y="35" width="210" height="28" rx="14" fill="rgba(0,168,220,0.12)" stroke="rgba(0,168,220,0.3)" stroke-width="1"/>
  <text x="220" y="54" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#00A8DC" text-anchor="middle" letter-spacing="0.1em">SMALL ACCOUNT · 800 FOLLOWERS</text>

  <!-- Right label -->
  <rect x="655" y="35" width="240" height="28" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
