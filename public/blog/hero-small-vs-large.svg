  <circle cx="450" cy="250" r="35" fill="#00A8DC" opacity="0.08"/>
  <!-- Engagement pulses from small -->
  <circle cx="450" cy="250" r="90" stroke="#00A8DC" stroke-width="1" fill="none" opacity="0.12"/>
  <circle cx="450" cy="250" r="110" stroke="#00A8DC" stroke-width="0.5" fill="none" opacity="0.08"/>
  <circle cx="450" cy="250" r="130" stroke="#00A8DC" stroke-width="0.5" fill="none" opacity="0.04"/>
