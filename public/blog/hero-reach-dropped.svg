  <path d="M100 160 Q350 170 550 220 T950 350 T1350 440" stroke="#0077B5" stroke-width="1.5" fill="none" opacity="0.25"/>
  <path d="M100 90 Q280 100 480 140 T880 280 T1280 390" stroke="#00A8DC" stroke-width="1" fill="none" opacity="0.2"/>
  <!-- Grid dots -->
