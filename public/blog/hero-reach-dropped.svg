    <circle cx="200" cy="400" r="2"/><circle cx="400" cy="400" r="2"/><circle cx="600" cy="400" r="2"/><circle cx="800" cy="400" r="2"/><circle cx="1000" cy="400" r="2"/><circle cx="1200" cy="400" r="2"/>
