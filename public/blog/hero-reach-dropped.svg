      <stop offset="0%" stop-color="#0A66C2" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00A8DC" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="line1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A66C2" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#00A8DC" stop-opacity="0.4"/>
