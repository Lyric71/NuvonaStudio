    <circle cx="200" cy="100" r="2"/><circle cx="400" cy="100" r="2"/><circle cx="600" cy="100" r="2"/><circle cx="800" cy="100" r="2"/><circle cx="1000" cy="100" r="2"/><circle cx="1200" cy="100" r="2"/>
    <circle cx="200" cy="200" r="2"/><circle cx="400" cy="200" r="2"/><circle cx="600" cy="200" r="2"/><circle cx="800" cy="200" r="2"/><circle cx="1000" cy="200" r="2"/><circle cx="1200" cy="200" r="2"/>
